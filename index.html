<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>এস এ লাইভ টিভি</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-color: #ef4444;
            --bg-color: #030712;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --text-color: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(31, 41, 55, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; }

        /* হেডার */
        header { padding: 15px 20px; background: var(--panel-bg); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .menu-btn { background: #ef4444; border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        /* মেইন লেআউট - ল্যাপটপের জন্য */
        .app-layout { 
            display: flex; 
            flex-direction: column; 
            height: calc(100vh - 70px); 
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        .player-section { flex: 0 0 auto; width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
        .video-container { aspect-ratio: 16/9; }
        
        .main-content { flex: 1; overflow-y: auto; }
        .channel-list { display: flex; flex-direction: column; gap: 8px; }
        .channel-row { background: var(--card-bg); padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid var(--border-color); }
        
        /* ল্যাপটপ লেআউট পরিবর্তন (Side-by-Side) */
        @media (min-width: 951px) {
            .app-layout { 
                flex-direction: row; 
                max-width: 1400px; 
                margin: 0 auto; 
            }
            .player-section { 
                flex: 2; /* ভিডিও বড় জায়গা নেবে */
                height: fit-content;
                position: sticky;
                top: 0;
            }
            .main-content { 
                flex: 1; /* চ্যানেল লিস্ট ডানে থাকবে */
                height: calc(100vh - 100px); 
            }
            .controls-wrapper { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1>এস এ লাইভ টিভি</h1>
        </div>
    </header>

    <div class="app-layout">
        <!-- ভিডিও প্লেয়ার -->
        <div class="player-section" id="playerSection">
            <div class="video-container" id="videoContainer">
                <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
            </div>
            <div style="padding: 10px; font-size: 14px; text-align: center;">
                এখন দেখছেন: <span id="playingTitle" style="color:var(--brand-color)">কোনোটি নয়</span>
            </div>
        </div>

        <!-- চ্যানেল লিস্ট -->
        <div class="main-content">
            <div class="controls-wrapper" id="controlsWrapper">
                <select id="categoryDropdown" onchange="filterCategory(this.value)" style="padding: 10px; background: #1f2937; color: white; border-radius: 8px;">
                    <option value="All">All Categories</option>
                </select>
                <input type="text" id="searchBox" placeholder="সার্চ করুন..." oninput="searchChannel()" style="padding: 10px; background: #1f2937; color: white; border-radius: 8px; border:none;">
            </div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        // আপনার আগের ফাংশনালিটিগুলো এখানে থাকবে...
        // শুধু মনে রাখবেন, ল্যাপটপে এখন প্লেয়ার বামে এবং লিস্ট ডানে দেখাবে।
        console.log("Layout set to Side-by-Side for Laptop.");
    </script>
</body>
</html>
