<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>এস এ লাইভ টিভি | প্রফেশনাল স্ট্রিমিং</title>
    
    <!-- 🌍 প্রিমিয়াম কোর লাইব্রেরী ও গ্লোবাল ফন্ট -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 🎨 গ্লোবাল রিসেট এবং লাক্সারি থিম ইঞ্জিন */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --brand-color: #ef4444;
            --brand-hover: #dc2626;
            --brand-glow: rgba(239, 68, 68, 0.25);
            --bg-color: #030712;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: #1f2937;
            --border-color: rgba(255, 255, 255, 0.06);
            --card-bg: rgba(31, 41, 55, 0.4);
            --card-hover: rgba(239, 68, 68, 0.06);
            --drawer-bg: rgba(3, 7, 18, 0.94);
            --glass-blur: blur(20px);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --input-bg: #e2e8f0;
            --border-color: rgba(0, 0, 0, 0.06);
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-hover: rgba(239, 68, 68, 0.04);
            --drawer-bg: rgba(255, 255, 255, 0.96);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 👑 ওয়ান-লাইন প্রিমিয়াম হেডার */
        header {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-btn:hover {
            background: var(--brand-color);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px var(--brand-glow);
        }

        header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #9ca3af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        [data-theme="light"] header h1 {
            background: linear-gradient(135deg, #0f172a 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .channel-count-badge {
            background: rgba(239, 68, 68, 0.1);
            color: var(--brand-color);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 99px;
            letter-spacing: 0.5px;
        }

        /* 💎 সাইডবার ড্রয়ার (Netflix স্টাইল) */
        .sidebar-drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100vh;
            background: var(--drawer-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            z-index: 10000;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }
        .sidebar-drawer.open { left: 0; }

        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .drawer-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
        }

        .close-drawer-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 14px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .close-drawer-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--brand-color);
        }

        .drawer-menu-items {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }
        .drawer-item:hover {
            background: var(--card-bg);
            border-color: var(--border-color);
            transform: translateX(4px);
        }

        .drawer-item .icon-box {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 15px;
            transition: all 0.25s ease;
        }
        .drawer-item:hover .icon-box {
            color: var(--brand-color);
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .drawer-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.show { opacity: 1; pointer-events: auto; }

        /* 🔍 কন্ট্রোল জোন (সার্চ ও ফিল্টার) */
        .controls-wrapper {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }

        .category-select-wrapper {
            position: relative;
            flex: 1;
        }
        .category-dropdown {
            width: 100%;
            padding: 11px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 13px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .category-select-wrapper::after {
            content: "\f0d7";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 12px;
            color: var(--text-muted);
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .search-container {
            flex: 1.2;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 11px 16px 11px 40px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: rgba(239, 68, 68, 0.5);
        }
        .search-container::before {
            content: "\f002";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
        }

        /* 🎬 আল্ট্রা-মডার্ন সিনেমাটিক প্লেয়ার এরিয়া */
        .player-section {
            background: #000;
            width: 100%;
            position: relative;
            padding: 0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid var(--border-color);
            display: none;
        }

        .playing-now-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .notice-live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--brand-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--brand-color);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }

        .video-js {
            background-color: #000 !important;
            width: 100% !important;
            height: 100% !important;
        }
        .video-js video { object-fit: contain !important; }
        .video-js.forced-zoom video { object-fit: cover !important; transform: scale(1.02); }

        .vjs-custom-rotate-button {
            cursor: pointer;
            font-size: 1.4em;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
        }

        /* 📺 প্রিমিয়াম চ্যানেল গ্রিড ও লিস্ট */
        .app-layout {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .channel-row {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .channel-row:hover {
            background: var(--card-hover);
            border-color: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        .channel-row.active-channel {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.4);
            box-shadow: inset 0 0 12px rgba(239, 68, 68, 0.05);
        }

        .channel-left {
            display: flex;
            align-items: center;
            gap: 16px;
            overflow: hidden;
            width: 80%;
        }

        .logo-wrapper {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }

        .channel-fallback-logo {
            font-size: 18px;
            color: var(--text-muted);
        }

        .channel-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-right-action {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .play-icon {
            color: var(--text-muted);
            font-size: 14px;
            opacity: 0;
            transform: translateX(-5px);
            transition: all 0.2s;
        }
        .channel-row:hover .play-icon {
            opacity: 1;
            transform: translateX(0);
            color: var(--brand-color);
        }

        .channel-live-badge {
            background: var(--brand-color);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            display: none;
            box-shadow: 0 0 10px var(--brand-glow);
        }

        .active-channel .play-icon { display: none !important; }
        .active-channel .channel-live-badge { display: inline-block !important; }

        .no-result { text-align: center; color: var(--text-muted); padding: 40px; font-weight: 500; font-size: 14px; }
        #loading { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 60px; font-weight: 500; }
        
        /* 🖥️ ডেক্সটপ ও ল্যাপটপ লেআউট স্পেশাল ডিজাইন */
        @media (min-width: 951px) {
            .app-layout { flex-direction: row; height: calc(100vh - 69px); }
            
            .player-section {
                flex: 1.6;
                display: none;
                background: radial-gradient(circle at center, rgba(239, 68, 68, 0.04) 0%, #000 100%);
                height: 100%;
                border-bottom: none;
                border-right: 1px solid var(--border-color);
                padding: 24px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            .playing-now-bar {
                background: transparent;
                border-bottom: none;
                padding: 0 0 16px 0;
                font-size: 14px;
            }

            .video-container {
                width: 100%;
                flex: 1;
                aspect-ratio: auto;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            }

            .main-content {
                flex: 1;
                height: 100%;
                overflow-y: auto;
                padding: 24px;
                display: flex;
                flex-direction: column;
            }
            
            .controls-wrapper { margin-top: 0; }
            .channel-list { flex: 1; overflow-y: auto; }
        }

        /* 📱 ল্যান্ডস্কেপ ও ফুলস্ক্রিন সিনেমা মোড */
        @media (max-width: 950px) and (orientation: landscape) {
            header, .controls-wrapper, .playing-now-bar, .main-content { display: none !important; }
            body, html { height: 100% !important; width: 100% !important; overflow: hidden !important; }

            .player-section, .video-container {
                width: 100vw !important;
                height: 100vh !important;
                position: fixed !important;
                top: 0 !important; left: 0 !important;
                border: none !important;
                z-index: 9999999 !important;
                display: block !important;
                aspect-ratio: auto !important;
                padding: 0 !important;
            }
            .video-js { width: 100vw !important; height: 100vh !important; }
            .video-js video { object-fit: fill !important; }
        }
    </style>
</head>
<body>

    <!-- সাইডবার ড্রয়ার ও ওভারলে -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleMenu()"></div>
    <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="drawer-header">
            <h2>নিয়ন্ত্রণ প্যানেল</h2>
            <button class="close-drawer-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-menu-items">
            <!-- 🌓 থিম চেঞ্জার -->
            <div class="drawer-item" onclick="toggleTheme()">
                <div class="icon-box"><i class="fa-solid fa-moon"></i></div>
                <span>থিম পরিবর্তন (Light/Dark)</span>
            </div>
            
            <!-- 🔄 প্লেলিস্ট রিফ্রেশ -->
            <div class="drawer-item" onclick="refreshPlaylist()">
                <div class="icon-box"><i class="fa-solid fa-arrows-rotate"></i></div>
                <span>প্লেলিস্ট রিফ্রেশ করুন</span>
            </div>
            
            <!-- 🎯 টেলিগ্রাম কমিউনিটি -->
            <a href="https://t.me/banglatvlivefree" target="_blank" class="drawer-item">
                <div class="icon-box"><i class="fa-brands fa-telegram"></i></div>
                <span>টেলিগ্রাম চ্যানেল (লিংক)</span>
            </a>
            
            <!-- 💬 ফেসবুক সাপোর্ট -->
            <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank" class="drawer-item">
                <div class="icon-box"><i class="fa-brands fa-facebook-messenger"></i></div>
                <span>ফেসবুক পেজ (সাপোর্ট)</span>
            </a>
        </div>
    </div>

    <!-- হেডার জোন -->
    <header>
        <div class="header-left">
            <button class="menu-btn" id="menuBtn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1>এস এ লাইভ টিভি</h1>
        </div>
        <div class="channel-count-badge" id="totalChannels">CH-0</div>
    </header>

    <div class="app-layout">
        <!-- প্রিমিয়াম প্লেয়ার উইন্ডো -->
        <div class="player-section" id="playerSection">
            <div class="playing-now-bar">
                <span class="notice-live-dot"></span>
                <span>এখন দেখছেন: <span id="playingTitle" style="color: var(--brand-color);">কোনো চ্যানেল সিলেক্ট করা নেই</span></span>
            </div>
            <div class="video-container" id="videoContainer">
                <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline>
                    <p class="vjs-no-js">আপনার ব্রাউজারটি এই প্লেয়ারটি সাপোর্ট করছে না।</p>
                </video>
            </div>
        </div>

        <!-- কন্টেন্ট হাব -->
        <div class="main-content">
            <div class="controls-wrapper" id="controlsWrapper">
                <div class="category-select-wrapper">
                    <select class="category-dropdown" id="categoryDropdown" onchange="filterCategory(this.value)">
                        <option value="All">All Categories</option>
                    </select>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="searchBox" placeholder="চ্যানেল সার্চ করুন..." oninput="searchChannel()">
                </div>
            </div>

            <div id="loading"><i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px;"></i> ক্লাউড সার্ভার থেকে চ্যানেল লোড হচ্ছে...</div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <!-- ভিডিও ইঞ্জিন কোড -->
    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    
    <script>
        let player; 
        const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u';

        const fetchUrls = [
            githubUrl,
            'https://corsproxy.io/?' + encodeURIComponent(githubUrl),
            'https://api.allorigins.win/raw?url=' + encodeURIComponent(githubUrl),
            'https://thingproxy.freeboard.io/fetch/' + githubUrl
        ];

        let currentUrlIndex = 0;
        let allChannels = [];
        let currentSelectedCategory = 'All'; 
        let lastUserCategory = 'All'; 

        function toggleMenu() {
            document.getElementById('sidebarDrawer').classList.toggle('open');
            document.getElementById('drawerOverlay').classList.toggle('show');
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
            toggleMenu();
        }

        function refreshPlaylist() {
            toggleMenu();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('channelList').innerHTML = '';
            currentUrlIndex = 0;
            fetchPlaylist();
        }

        async function fetchPlaylist() {
            if (currentUrlIndex >= fetchUrls.length) {
                document.getElementById('loading').innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> নেটওয়ার্ক কানেকশন ব্যর্থ হয়েছে।";
                return;
            }
            try {
                const response = await fetch(fetchUrls[currentUrlIndex]);
                if (!response.ok) throw new Error('Load error');
                const textData = await response.text();
                if(textData && textData.includes('#EXTM3U')) {
                    parseM3U(textData);
                } else {
                    throw new Error('Format error');
                }
            } catch (err) {
                currentUrlIndex++;
                fetchPlaylist();
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            allChannels = [];
            let categories = new Set();
            let currentName = ''; let currentLogo = ''; let currentGroup = 'Uncategorized';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1] : 'Uncategorized';
                    const nameParts = line.split(',');
                    currentName = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, logo: currentLogo, category: currentGroup, url: line });
                        if(currentGroup !== 'Uncategorized') categories.add(currentGroup);
                    }
                    currentName = ''; currentLogo = '';
                }
            });

            document.getElementById('totalChannels').innerText = "CH-" + allChannels.length;
            populateCategoryDropdown(categories);
            renderChannels(allChannels); 
            document.getElementById('loading').style.display = 'none';
            document.getElementById('controlsWrapper').style.display = 'flex'; 
            
            if (allChannels.length > 0 && window.innerWidth > 950) {
                const firstRow = document.querySelector('.channel-row');
                if(firstRow) firstRow.click();
            }
        }

        function populateCategoryDropdown(categories) {
            const dropdown = document.getElementById('categoryDropdown');
            dropdown.innerHTML = '<option value="All">All Categories</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat;
                dropdown.appendChild(option);
            });
        }

        function renderChannels(channels) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';

            if(channels.length === 0) {
                listContainer.innerHTML = '<div class="no-result">কোনো চ্যানেল খুঁজে পাওয়া যায়নি!</div>';
                return;
            }

            channels.forEach(ch => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.onclick = function() { playVideo(ch.name, ch.url, this); };

                let logoHtml = ch.logo ? `<img class="channel-logo" src="${ch.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : '';
                const fallbackHtml = `<div class="channel-fallback-logo" style="display: ${ch.logo ? 'none' : 'flex'}"><i class="fa-solid fa-tv"></i></div>`;

                row.innerHTML = `
                    <div class="channel-left">
                        <div class="logo-wrapper">${logoHtml}${fallbackHtml}</div>
                        <div class="channel-name">${ch.name}</div>
                    </div>
                    <div class="channel-right-action">
                        <div class="play-icon"><i class="fa-solid fa-play"></i></div>
                        <span class="channel-live-badge">LIVE</span>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        function filterCategory(category) {
            currentSelectedCategory = category; 
            if (document.getElementById('searchBox').value === '') lastUserCategory = category;
            document.getElementById('categoryDropdown').value = category;

            if (category === 'All') {
                renderChannels(allChannels);
            } else {
                renderChannels(allChannels.filter(ch => ch.category === category));
            }
        }

        function searchChannel() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();
            if (query !== '') {
                currentSelectedCategory = 'All';
                document.getElementById('categoryDropdown').value = 'All'; 
                renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(query)));
            } else {
                filterCategory(lastUserCategory); 
            }
        }

        function playVideo(name, url, clickedElement) {
            document.querySelectorAll('.channel-row.active-channel').forEach(row => row.classList.remove('active-channel'));
            clickedElement.classList.add('active-channel');
            document.getElementById('playingTitle').innerText = name;
            
            const pSection = document.getElementById('playerSection');
            pSection.style.display = (window.innerWidth > 950) ? 'flex' : 'block';
            
            if (!player) {
                player = videojs('live-player');
                addCustomRotateButton(); 
                setupOrientationTrigger();
                setupForcedDoubleTapZoom(); 
            }
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            
            if(window.innerWidth <= 950) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setupForcedDoubleTapZoom() {
            const container = document.getElementById('videoContainer');
            let lastTapTime = 0;

            container.addEventListener('touchstart', function(e) {
                const now = new Date().getTime();
                const timespan = now - lastTapTime;
                if (timespan < 300 && timespan > 0) {
                    e.preventDefault(); 
                    toggleZoomState();
                }
                lastTapTime = now;
            }, { passive: false });

            container.addEventListener('dblclick', function(e) {
                e.preventDefault();
                toggleZoomState();
            });

            function toggleZoomState() {
                const playerEl = document.getElementById('live-player');
                if (playerEl) playerEl.classList.toggle('forced-zoom');
            }
        }

        function addCustomRotateButton() {
            const Button = videojs.getComponent('Button');
            const RotateButton = videojs.extend(Button, {
                constructor: function() {
                    Button.apply(this, arguments);
                    this.controlText('Rotate Screen');
                },
                createEl: function() {
                    return videojs.dom.createEl('button', {
                        className: 'vjs-custom-rotate-button vjs-control vjs-button',
                        innerHTML: '<i class="fa-solid fa-screen-rotation"></i>',
                        title: 'Rotate Screen'
                    });
                },
                handleClick: function() {
                    if(window.innerWidth > 950) return;
                    const container = document.getElementById('playerSection');
                    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                        if (container.requestFullscreen) container.requestFullscreen();
                        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                    } else {
                        if (document.exitFullscreen) document.exitFullscreen();
                        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    }
                }
            });
            videojs.registerComponent('RotateButton', RotateButton);
            player.getChild('controlBar').addChild('RotateButton', {}, player.getChild('controlBar').children_.length - 1);
        }

        function setupOrientationTrigger() {
            window.addEventListener("resize", checkOrientation);
            window.addEventListener("orientationchange", checkOrientation);

            function checkOrientation() {
                if(window.innerWidth > 950) return;
                if (window.innerWidth > window.innerHeight) {
                    document.body.style.setProperty('--orientation-status', 'landscape');
                } else {
                    document.body.style.setProperty('--orientation-status', 'portrait');
                }
            }
            checkOrientation();
        }

        window.onload = fetchPlaylist;
    </script>
</body>
</html>
