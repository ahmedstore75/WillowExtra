<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>বাংলা টিভি — প্রিমিয়াম লাইভ</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-color); }

        :root {
            --brand-color: #ef4444;
            --brand-glow: rgba(239, 68, 68, 0.35);
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.75);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: #111827;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(239, 68, 68, 0.08);
            --drawer-bg: rgba(3, 7, 18, 0.96);
            --glass-blur: blur(24px);
            --box-shadow-premium: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--box-shadow-premium);
            flex-shrink: 0;
            width: 100%;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .menu-btn {
            background: linear-gradient(135deg, #ff007f, #7928ca, #0070f3);
            border: none; color: white; font-size: 16px; width: 40px; height: 40px;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.3s ease;
        }

        header h1 { font-size: 20px; font-weight: 700; color: var(--brand-color); }
        .channel-count-badge { background: rgba(239, 68, 68, 0.1); color: var(--brand-color); font-size: 12px; font-weight: 600; padding: 6px 14px; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 99px; }

        .player-section {
            background: #000 !important; 
            width: calc(100% - 24px) !important;
            margin: 12px auto 8px auto !important;
            position: relative !important;
            z-index: 95 !important;
            border-radius: 16px !important; 
            overflow: hidden !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 25px var(--brand-glow) !important;
            border: 1px solid rgba(239, 68, 68, 0.25) !important; 
            display: block !important;
        }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; }
        .video-js, #clappr-player { width: 100% !important; height: 100% !important; }
        
        .video-container video, 
        .video-js video, 
        #clappr-player video, 
        .vjs-tech { 
            object-fit: contain !important; 
            width: 100% !important;
            height: 100% !important;
        }

        .player-section.fullscreen-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            z-index: 9999999 !important;
        }
        .player-section.fullscreen-mode .video-container,
        .player-section.fullscreen-mode .video-js,
        .player-section.fullscreen-mode #clappr-player {
            width: 100vw !important;
            height: 100vh !important;
        }

        .player-nav-zone {
            position: absolute; top: 0; bottom: 45px; width: 20%; z-index: 100;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: rgba(255, 255, 255, 0); font-size: 24px; transition: all 0.2s ease;
        }
        .player-nav-left { left: 0; }
        .player-nav-right { right: 0; }
        .player-nav-zone:hover { background: rgba(0, 0, 0, 0.2); color: rgba(255, 255, 255, 0.6); }

        .app-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; width: 100%; }
        .right-column-wrapper { display: flex; flex-direction: column; flex: 1; overflow: hidden; width: 100%; }
        .main-content { flex: 1; padding: 4px 12px 20px 12px; overflow-y: auto; overflow-x: hidden; width: 100%; }
        
        .channel-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px; width: 100%; }
        .channel-row { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 8px; cursor: pointer; position: relative; width: 100%; transition: all 0.25s ease; }
        .channel-row:hover { background: var(--card-hover); border-color: rgba(239, 68, 68, 0.35); transform: translateY(-2px); outline: 3px solid #ffdd44 !important; }
        .channel-row.active-channel { background: rgba(239, 68, 68, 0.12); border-color: var(--brand-color); box-shadow: 0 0 14px var(--brand-glow); }
        .channel-left { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
        .logo-wrapper { width: 54px; height: 54px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid var(--border-color); padding: 5px; display: flex; align-items: center; justify-content: center; }
        .channel-logo { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
        .channel-fallback-logo { font-size: 20px; color: var(--text-muted); }
        .channel-name { font-size: 12px; font-weight: 600; color: var(--text-color); width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-right-action { position: absolute; top: 6px; right: 6px; }
        .channel-live-badge { background: var(--brand-color); color: white; font-size: 8px; font-weight: 800; padding: 1px 5px; border-radius: 4px; display: none; }
        .active-channel .channel-live-badge { display: inline-block !important; }

        @media (min-width: 951px) {
            .app-layout { display: grid; grid-template-columns: 1.55fr 1.05fr; gap: 20px; padding: 20px; flex: 1; height: calc(100vh - 70px); max-width: 1550px; margin: 0 auto; width: 100%; overflow: hidden; }
            .player-left-column { display: block !important; width: 100% !important; }
            .player-section { width: 100% !important; margin: 0 !important; border-radius: 20px !important; }
            .right-column-wrapper { display: flex; flex-direction: column; overflow: hidden; height: 100%; background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 20px; width: 100%; }
            .main-content { padding: 16px; height: 100%; width: 100%; }
            .channel-list { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .logo-wrapper { width: 58px; height: 58px; }
            .channel-name { font-size: 13.5px; }
        }

        @media (max-width: 950px) and (orientation: landscape) {
            header, .main-content { display: none !important; }
            .player-section { 
                width: 100vw !important; 
                height: 100vh !important; 
                position: fixed !important; 
                top: 0; left: 0; 
                border: none !important; 
                border-radius: 0 !important; 
                margin: 0 !important; 
                z-index: 9999999; 
                display: block !important; 
            }
            .video-container, .video-js, #clappr-player { width: 100vw !important; height: 100vh !important; }
            .video-js video, #clappr-player video, .vjs-tech { 
                object-fit: contain !important; 
                width: 100vw !important; 
                height: 100vh !important; 
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1 id="langAppTitle">বাংলা টিভি</h1>
        </div>
        <div class="channel-count-badge" id="totalChannels">CH-0</div>
    </header>

    <div class="app-layout">
        <div class="player-left-column">
            <div class="player-section" id="playerSection">
                <div class="video-container" id="videoContainer">
                    <div class="player-nav-zone player-nav-left" onclick="navigateChannel('prev')">
                        <i class="fa-solid fa-chevron-left"></i>
                    </div>
                    <div class="player-nav-zone player-nav-right" onclick="navigateChannel('next')">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                    <div id="player-mount-point"></div>
                </div>
            </div>
        </div>

        <div class="right-column-wrapper">
            <div class="main-content">
                <div class="channel-list" id="channelList"></div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clappr-rtmp-plugin@latest/dist/clappr-rtmp-plugin.min.js"></script>
    
    <script>
        let player = null; 
        let clapprPlayerInstance = null;
        const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';
        
        const fetchUrls = [
            'https://corsproxy.io/?' + encodeURIComponent(githubUrl),
            githubUrl,
            'https://api.allorigins.win/raw?url=' + encodeURIComponent(githubUrl)
        ];

        let currentUrlIndex = 0;
        let allChannels = [];
        let activeChannelIndex = -1; 

        async function fetchPlaylist() {
            if (currentUrlIndex >= fetchUrls.length) return;
            try {
                const response = await fetch(fetchUrls[currentUrlIndex]);
                if (!response.ok) throw new Error();
                const textData = await response.text();
                parseM3U(textData);
            } catch (err) {
                currentUrlIndex++;
                await fetchPlaylist();
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            allChannels = [];
            let currentName = ''; let currentLogo = '';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const nameParts = line.split(',');
                    currentName = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, logo: currentLogo, url: line });
                    }
                    currentName = ''; currentLogo = '';
                }
            });

            document.getElementById('totalChannels').innerText = "CH-" + allChannels.length;
            renderChannels(allChannels); 
            if (allChannels.length > 0 && window.innerWidth > 950) playChannelAt(0);
        }

        function playChannelAt(index) {
            if (allChannels.length === 0 || index < 0 || index >= allChannels.length) return;
            activeChannelIndex = index;
            const ch = allChannels[index];

            document.querySelectorAll('.channel-row').forEach(row => row.classList.remove('active-channel'));
            const activeRow = document.querySelector(`.channel-row[data-index="${index}"]`);
            if (activeRow) {
                activeRow.classList.add('active-channel');
                activeRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            resetContainers();
            const container = document.getElementById('player-mount-point');
            container.innerHTML = `<video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>`;
            
            player = videojs('live-player', { fluid: true, aspectRatio: '16:9' });
            player.on('error', () => switchToClappr(ch.url));

            try {
                player.src({ src: ch.url, type: 'application/x-mpegURL' });
                player.play();
                setTimeout(handleScreenResize, 300);
            } catch(e) {
                switchToClappr(ch.url);
            }
        }

        function switchToClappr(streamUrl) {
            resetContainers();
            const container = document.getElementById('player-mount-point');
            container.innerHTML = `<div id="clappr-player"></div>`;
            try {
                clapprPlayerInstance = new Clappr.Player({
                    source: streamUrl, parentId: "#clappr-player",
                    preload: 'auto', autoPlay: true, controls: true,
                    width: '100%', height: '100%'
                });
                setTimeout(handleScreenResize, 300);
            } catch(e) {}
        }

        function handleScreenResize() {
            const isLandscape = window.innerWidth > window.innerHeight;
            const playerSec = document.getElementById('playerSection');
            
            if (isLandscape && window.innerWidth <= 950) {
                if (playerSec) {
                    playerSec.classList.add('fullscreen-mode');
                    if (playerSec.requestFullscreen) playerSec.requestFullscreen().catch(() => {});
                }
                if (player) {
                    player.fluid(false);
                    player.dimensions(window.innerWidth, window.innerHeight);
                }
            } else {
                if (playerSec) playerSec.classList.remove('fullscreen-mode');
                if (document.fullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                }
                if (player) player.fluid(true);
            }
        }

        window.addEventListener('resize', handleScreenResize);
        window.addEventListener('orientationchange', () => setTimeout(handleScreenResize, 250));

        function renderChannels(channels) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';
            channels.forEach((ch, index) => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.setAttribute('data-index', index);
                row.onclick = () => playChannelAt(index);

                let logoHtml = ch.logo ? `<img class="channel-logo" src="${ch.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : '';
                const fallbackHtml = `<div class="channel-fallback-logo" style="display: ${ch.logo ? 'none' : 'flex'}"><i class="fa-solid fa-tv"></i></div>`;

                row.innerHTML = `
                    <div class="channel-left">
                        <div class="logo-wrapper">${logoHtml}${fallbackHtml}</div>
                        <div class="channel-name">${ch.name}</div>
                    </div>
                    <div class="channel-right-action"><span class="channel-live-badge">LIVE</span></div>
                `;
                listContainer.appendChild(row);
            });
        }

        function navigateChannel(direction) {
            if (allChannels.length === 0) return;
            let nextIndex = activeChannelIndex;
            if (direction === 'next') {
                nextIndex = activeChannelIndex + 1;
                if (nextIndex >= allChannels.length) nextIndex = 0; 
            } else {
                nextIndex = activeChannelIndex - 1;
                if (nextIndex < 0) nextIndex = allChannels.length - 1; 
            }
            playChannelAt(nextIndex);
        }

        function resetContainers() {
            if (player) { try { player.dispose(); } catch(e){} player = null; }
            if (clapprPlayerInstance) { try { clapprPlayerInstance.destroy(); } catch(e){} clapprPlayerInstance = null; }
            document.getElementById('player-mount-point').innerHTML = '';
        }

        window.onload = () => { fetchPlaylist(); };
    </script>
</body>
</html>
