<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>বাংলা টিভি</title>
    
    <!-- 🌍 কোর লাইব্রেরী ও গ্লোবাল ফন্ট -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 🎨 গ্লোবাল রিসেট এবং ডাইনামিক থিম ইঞ্জিন */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --brand-color: #ef4444;
            --brand-glow: rgba(239, 68, 68, 0.25);
            --bg-color: #030712;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: #1f2937;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(31, 41, 55, 0.4);
            --card-hover: rgba(239, 68, 68, 0.06);
            --drawer-bg: rgba(3, 7, 18, 0.96);
            --glass-blur: blur(20px);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.06);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-hover: rgba(239, 68, 68, 0.04);
            --drawer-bg: rgba(255, 255, 255, 0.98);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* পুরো বডির মেইন স্ক্রলিং লকড */
            transition: background-color 0.3s, color 0.3s;
        }

        /* 👑 প্রিমিয়াম হেডার */
        header {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .menu-btn {
            background: linear-gradient(135deg, #ff007f, #7928ca, #0070f3);
            border: none; color: white; font-size: 16px; width: 40px; height: 40px;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(121, 40, 202, 0.4);
        }
        .menu-btn:hover { transform: scale(1.05) rotate(5deg); }

        header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--brand-color); }
        .channel-count-badge { background: rgba(239, 68, 68, 0.1); color: var(--brand-color); font-size: 12px; font-weight: 600; padding: 6px 14px; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 99px; }

        /* 💎 সাইডবার ড্রয়ার */
        .sidebar-drawer {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100vh;
            background: var(--drawer-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.4); z-index: 10000;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; border-right: 1px solid var(--border-color);
        }
        .sidebar-drawer.open { left: 0; }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .drawer-header h2 { font-size: 18px; font-weight: 700; background: linear-gradient(45deg, #ff3366, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .close-drawer-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--brand-color); font-size: 14px; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .drawer-menu-items { padding: 24px 16px; display: flex; flex-direction: column; gap: 12px; }
        .drawer-item { display: flex; align-items: center; gap: 16px; padding: 14px 16px; color: var(--text-color); font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.02); transition: all 0.25s ease; }
        .drawer-item:hover { transform: translateX(6px); background: rgba(255, 255, 255, 0.05); }
        .drawer-item .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; }
        .theme-item .icon-box { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .refresh-item .icon-box { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .telegram-item .icon-box { background: linear-gradient(135deg, #0088cc, #006699); box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3); }
        .facebook-item .icon-box { background: linear-gradient(135deg, #1877f2, #0d5bf2); box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3); }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .drawer-overlay.show { opacity: 1; pointer-events: auto; }

        /* 📺 ভিডিও প্লেয়ার এরিয়া (মোবাইলে স্টিকি এবং চমৎকার রাউন্ড শেপ) */
        .player-section {
            background: #000 !important; 
            width: 100% !important;
            position: sticky !important;
            top: 0 !important;
            z-index: 95 !important;
            /* নিচের দুই কোণা রাউন্ড করার চমৎকার ডিজাইন */
            border-bottom-left-radius: 20px !important;
            border-bottom-right-radius: 20px !important;
            overflow: hidden !important;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7), 0 0 15px var(--brand-glow) !important;
            border-bottom: 2px solid rgba(239, 68, 68, 0.4) !important; 
            border-left: 1px solid var(--border-color) !important;
            border-right: 1px solid var(--border-color) !important;
            display: block !important;
        }

        .playing-now-bar {
            background: rgba(0, 0, 0, 0.8); padding: 10px 16px;
            font-size: 13px; display: flex; align-items: center; gap: 12px;
        }

        .notice-live-dot {
            width: 8px; height: 8px; background-color: var(--brand-color);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; }
        .video-js, .native-player-style { width: 100% !important; height: 100% !important; }
        .video-js.forced-zoom video, .forced-zoom { object-fit: cover !important; }

        /* 🔍 সার্চ ও ক্যাটাগরি জোন */
        .sticky-controls-container { 
            padding: 14px 12px 10px 12px; 
            position: sticky; 
            top: 0; 
            z-index: 90; 
            background: var(--bg-color);
        }
        .controls-wrapper {
            background: var(--panel-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 8px; display: flex; align-items: center; gap: 8px;
        }

        .category-select-wrapper { position: relative; flex: 1; }
        .category-dropdown {
            width: 100%; padding: 10px 12px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);
            font-size: 12px; font-weight: 500; outline: none; cursor: pointer; appearance: none;
        }
        .category-select-wrapper::after {
            content: "\f0d7"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            color: var(--brand-color); pointer-events: none;
        }

        .search-container { flex: 1.2; position: relative; }
        .search-input {
            width: 100%; padding: 10px 12px 10px 32px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);
            font-size: 12px; outline: none;
        }
        .search-container::before {
            content: "\f002"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--brand-color);
        }

        /* 📺 লেআউট স্ট্রাকচার */
        .app-layout { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            overflow: hidden; 
        }
        
        .right-column-wrapper { 
            display: flex; 
            flex-direction: column; 
            flex: 1;
            overflow: hidden;
        }

        /* শুধুমাত্র নিচের এই অংশটুকু স্ক্রল হবে */
        .main-content { 
            flex: 1; 
            padding: 0 12px 20px 12px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        .channel-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }

        .channel-row {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px 16px; display: flex;
            align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s ease;
        }
        .channel-row:hover { background: var(--card-hover); border-color: rgba(239, 68, 68, 0.2); transform: translateX(4px); }
        .channel-row.active-channel { background: rgba(239, 68, 68, 0.08); border-color: rgba(239, 68, 68, 0.4); }

        .channel-left { display: flex; align-items: center; gap: 16px; overflow: hidden; width: 80%; }
        .logo-wrapper {
            width: 48px; height: 48px; flex-shrink: 0; background: rgba(255, 255, 255, 0.02);
            border-radius: 10px; border: 1px solid var(--border-color);
            padding: 4px; display: flex; align-items: center; justify-content: center;
        }
        .channel-logo { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
        .channel-fallback-logo { font-size: 18px; color: var(--text-muted); }
        .channel-name { font-size: 15px; font-weight: 600; color: var(--brand-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .channel-right-action { display: flex; align-items: center; justify-content: flex-end; }
        .play-icon { color: var(--text-muted); font-size: 14px; opacity: 0; transform: translateX(-5px); transition: all 0.2s; }
        .channel-row:hover .play-icon { opacity: 1; transform: translateX(0); color: var(--brand-color); }
        .channel-row.active-channel .play-icon { display: none !important; }
        .channel-live-badge { background: var(--brand-color); color: white; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 6px; display: none; }
        .active-channel .channel-live-badge { display: inline-block !important; }

        .no-result { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; }
        #loading { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 40px; }
        
        /* 💻 ল্যাপটপ এবং ডেক্সটপ প্রফেশনাল গ্রিড লেআউট */
        @media (min-width: 951px) {
            body { height: 100vh; overflow: hidden; }
            .app-layout {
                display: grid; grid-template-columns: 1.6fr 1.1fr; gap: 24px;
                padding: 20px; flex: 1; height: calc(100vh - 70px);
                max-width: 1600px; margin: 0 auto; width: 100%; overflow: hidden;
            }
            /* ল্যাপটপে চার কোণাই সমান রাউন্ড থাকবে */
            .player-section { width: 100% !important; margin: 0 !important; position: static !important; display: flex !important; flex-direction: column; height: fit-content; align-self: start; border-radius: 16px !important; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6) !important; border: 1px solid rgba(239, 68, 68, 0.15) !important; }
            .right-column-wrapper { display: flex; flex-direction: column; overflow: hidden; height: 100%; background: var(--panel-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 16px; }
            .sticky-controls-container { position: static; padding: 16px; border-bottom: 1px solid var(--border-color); background: transparent; }
            .controls-wrapper { display: flex !important; background: transparent; border: none; padding: 0; }
            .main-content { max-width: 100%; margin: 0; padding: 16px; overflow-y: auto; height: 100%; }
            #loading { margin-top: 30px; }
        }

        /* 📱 ল্যান্ডস্কেপ মোড (মোবাইল কাত করলে ফুলস্ক্রিন) */
        @media (max-width: 950px) and (orientation: landscape) {
            header, .sticky-controls-container, .playing-now-bar, .main-content { display: none !important; }
            .player-section { width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; border: none; border-radius: 0 !important; margin: 0; z-index: 9999999; display: block !important; }
            .video-container, .video-js, .native-player-style { width: 100vw !important; height: 100vh !important; }
            .video-js video, .native-player-style { object-fit: fill !important; }
        }
    </style>
</head>
<body>

    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleMenu()"></div>
    <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="drawer-header">
            <h2>নিয়ন্ত্রণ প্যানেল</h2>
            <button class="close-drawer-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-menu-items">
            <div class="drawer-item theme-item" onclick="toggleTheme()">
                <div class="icon-box"><i class="fa-solid fa-circle-half-stroke"></i></div>
                <span>থিম পরিবর্তন (Light/Dark)</span>
            </div>
            <div class="drawer-item refresh-item" onclick="refreshPlaylist()">
                <div class="icon-box"><i class="fa-solid fa-arrows-rotate"></i></div>
                <span>প্লেলিস্ট রিফ্রেশ করুন</span>
            </div>
            <a href="https://t.me/banglatvlivefree" target="_blank" class="drawer-item telegram-item">
                <div class="icon-box"><i class="fa-brands fa-telegram"></i></div>
                <span>টেলিগ্রাম চ্যানেল (লিংক)</span>
            </a>
            <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank" class="drawer-item facebook-item">
                <div class="icon-box"><i class="fa-brands fa-facebook-messenger"></i></div>
                <span>ফেসবুক পেজ (সাপোর্ট)</span>
            </a>
        </div>
    </div>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1>বাংলা টিভি</h1>
        </div>
        <div class="channel-count-badge" id="totalChannels">CH-0</div>
    </header>

    <div class="app-layout">
        <!-- 📺 ভিডিও প্লেয়ার এরিয়া (ওপরে স্টিকি এবং চমৎকার রাউন্ড শেপ) -->
        <div class="player-section" id="playerSection">
            <div class="playing-now-bar">
                <span class="notice-live-dot"></span>
                <span>এখন দেখছেন: <span id="playingTitle" style="color: var(--brand-color); font-weight: 700;">কোনো চ্যানেল সিলেক্ট করা নেই</span></span>
            </div>
            <div class="video-container" id="videoContainer">
                <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline>
                    <p class="vjs-no-js">আপনার ব্রাউজারটি এই প্লেয়ারটি সাপোর্ট করছে না।</p>
                </video>
            </div>
        </div>

        <!-- 📑 কন্ট্রোলস এবং চ্যানেল লিস্টের সমন্বিত কন্টেইনার -->
        <div class="right-column-wrapper">
            <div class="sticky-controls-container">
                <div class="controls-wrapper" id="controlsWrapper">
                    <div class="category-select-wrapper">
                        <select class="category-dropdown" id="categoryDropdown" onchange="filterCategory(this.value)">
                            <option value="All">All Categories</option>
                        </select>
                    </div>
                    <div class="search-container">
                        <input type="text" class="search-input" id="searchBox" placeholder="চ্যানেল সার্চ করুন..." oninput="searchChannel()">
                    </div>
                </div>
            </div>

            <!-- শুধুমাত্র এই অংশ স্ক্রল হবে -->
            <div class="main-content">
                <div id="loading"><i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px; color: var(--brand-color);"></i> ক্লাউড সার্ভার থেকে চ্যানেল লোড হচ্ছে...</div>
                <div class="channel-list" id="channelList"></div>
            </div>
        </div>
    </div>

    <!-- ভিডিও ইঞ্জিন স্ক্রিপ্ট -->
    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        let player; 
        let hlsBackupEngine = null;
        let isFirstInit = true; 
        const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u';
        const fetchUrls = [
            githubUrl,
            'https://corsproxy.io/?' + encodeURIComponent(githubUrl),
            'https://api.allorigins.win/raw?url=' + encodeURIComponent(githubUrl)
        ];

        let currentUrlIndex = 0;
        let allChannels = [];
        let currentSelectedCategory = 'All'; 
        let lastUserCategory = 'All'; 

        function toggleMenu() {
            document.getElementById('sidebarDrawer').classList.toggle('open');
            document.getElementById('drawerOverlay').classList.toggle('show');
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
            toggleMenu();
        }

        function refreshPlaylist() {
            toggleMenu();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('channelList').innerHTML = '';
            currentUrlIndex = 0;
            fetchPlaylist();
        }

        async function fetchPlaylist() {
            if (currentUrlIndex >= fetchUrls.length) {
                document.getElementById('loading').innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> লোড ব্যর্থ হয়েছে।";
                return;
            }
            try {
                const response = await fetch(fetchUrls[currentUrlIndex]);
                if (!response.ok) throw new Error();
                const textData = await response.text();
                if(textData && textData.includes('#EXTM3U')) parseM3U(textData);
                else throw new Error();
            } catch (err) {
                currentUrlIndex++;
                fetchPlaylist();
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            allChannels = [];
            let categories = new Set();
            let currentName = ''; let currentLogo = ''; let currentGroup = 'Uncategorized';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1] : 'Uncategorized';
                    const nameParts = line.split(',');
                    currentName = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, logo: currentLogo, category: currentGroup, url: line });
                        if(currentGroup !== 'Uncategorized') categories.add(currentGroup);
                    }
                    currentName = ''; currentLogo = '';
                }
            });

            document.getElementById('totalChannels').innerText = "CH-" + allChannels.length;
            populateCategoryDropdown(categories);
            renderChannels(allChannels); 
            document.getElementById('loading').style.display = 'none';
            document.getElementById('controlsWrapper').style.display = 'flex'; 
            
            initVideoPlayerEngine();

            if (allChannels.length > 0 && window.innerWidth > 950) {
                const firstRow = document.querySelector('.channel-row');
                if(firstRow) firstRow.click();
            }
        }

        function initVideoPlayerEngine() {
            try {
                player = videojs('live-player');
                setupForcedDoubleTapZoom();

                player.on('error', function() {
                    if (isFirstInit) {
                        isFirstInit = false;
                        return; 
                    }
                    switchToHlsBackup();
                });
            } catch(e) {}
        }

        function switchToHlsBackup() {
            const currentActiveRow = document.querySelector('.channel-row.active-channel');
            if(!currentActiveRow) return;

            if (player) { try { player.dispose(); }catch(e){} player = null; }

            const container = document.getElementById('videoContainer');
            container.innerHTML = `<video id="live-player" class="native-player-style" controls autoplay playsinline style="width:100%; height:100%; background:#000;"></video>`;
            const videoElement = document.getElementById('live-player');

            const chName = document.getElementById('playingTitle').innerText;
            const channelObj = allChannels.find(c => c.name === chName);
            if(!channelObj) return;

            if (Hls.isSupported()) {
                hlsBackupEngine = new Hls({ maxLoadingDelay: 4 });
                hlsBackupEngine.loadSource(channelObj.url);
                hlsBackupEngine.attachMedia(videoElement);
                setupForcedDoubleTapZoom();

                hlsBackupEngine.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        runNativeFallback(videoElement, channelObj.url, channelObj.name);
                    }
                });
            } else {
                runNativeFallback(videoElement, channelObj.url, channelObj.name);
            }
        }

        function populateCategoryDropdown(categories) {
            const dropdown = document.getElementById('categoryDropdown');
            dropdown.innerHTML = '<option value="All">All Categories</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat;
                dropdown.appendChild(option);
            });
        }

        function renderChannels(channels) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';

            if(channels.length === 0) {
                listContainer.innerHTML = '<div class="no-result">কোনো চ্যানেল খুঁজে পাওয়া যায়নি!</div>';
                return;
            }

            channels.forEach(ch => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.onclick = function() { playVideo(ch.name, ch.url, this); };

                let logoHtml = ch.logo ? `<img class="channel-logo" src="${ch.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : '';
                const fallbackHtml = `<div class="channel-fallback-logo" style="display: ${ch.logo ? 'none' : 'flex'}"><i class="fa-solid fa-tv"></i></div>`;

                row.innerHTML = `
                    <div class="channel-left">
                        <div class="logo-wrapper">${logoHtml}${fallbackHtml}</div>
                        <div class="channel-name">${ch.name}</div>
                    </div>
                    <div class="channel-right-action">
                        <div class="play-icon"><i class="fa-solid fa-play"></i></div>
                        <span class="channel-live-badge">LIVE</span>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        function filterCategory(category) {
            currentSelectedCategory = category; 
            if (document.getElementById('searchBox').value === '') lastUserCategory = category;
            document.getElementById('categoryDropdown').value = category;

            if (category === 'All') {
                renderChannels(allChannels);
            } else {
                renderChannels(allChannels.filter(ch => ch.category === category));
            }
        }

        function searchChannel() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();
            if (query !== '') {
                document.getElementById('categoryDropdown').value = 'All'; 
                renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(query)));
            } else {
                filterCategory(lastUserCategory); 
            }
        }

        function resetContainers() {
            if (player) {
                try { player.dispose(); } catch(e){}
                player = null;
            }
            if (hlsBackupEngine) {
                hlsBackupEngine.destroy();
                hlsBackupEngine = null;
            }
            document.getElementById('videoContainer').innerHTML = `<video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>`;
        }

        function playVideo(name, url, clickedElement) {
            isFirstInit = false; 
            document.querySelectorAll('.channel-row.active-channel').forEach(row => row.classList.remove('active-channel'));
            if(clickedElement) clickedElement.classList.add('active-channel');
            
            document.getElementById('playingTitle').innerText = name;
            
            resetContainers();

            player = videojs('live-player');
            setupForcedDoubleTapZoom();

            player.on('error', function() {
                switchToHlsBackup();
            });

            try {
                player.src({ src: url, type: 'application/x-mpegURL' });
                player.play();
            } catch(e) {}
        }

        function runNativeFallback(element, url, name) {
            if(hlsBackupEngine) { hlsBackupEngine.destroy(); hlsBackupEngine = null; }
            element.src = url;
            element.play().catch(e => {
                document.getElementById('playingTitle').innerText = name + " (চ্যানেল লিঙ্কটি বর্তমানে অফলাইন আছে)";
            });
            setupForcedDoubleTapZoom();
        }

        function setupForcedDoubleTapZoom() {
            const container = document.getElementById('videoContainer');
            let lastTapTime = 0;
            container.addEventListener('touchstart', function(e) {
                const now = new Date().getTime();
                if (now - lastTapTime < 300) {
                    e.preventDefault(); 
                    const targetPlayer = document.getElementById('live-player');
                    if(targetPlayer) targetPlayer.classList.toggle('forced-zoom');
                }
                lastTapTime = now;
            });
        }

        window.onload = fetchPlaylist;
    </script>
</body>
</html>
