<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>বাংলা টিভি — প্রিমিয়াম লাইভ</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(239, 68, 68, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-color);
        }

        :root {
            --brand-color: #ef4444;
            --brand-glow: rgba(239, 68, 68, 0.35);
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.75);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --input-bg: #111827;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(239, 68, 68, 0.08);
            --drawer-bg: rgba(3, 7, 18, 0.96);
            --glass-blur: blur(24px);
            --skeleton-bg: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            --notice-bg: rgba(239, 68, 68, 0.05);
            --notice-text-color: #ffffff; 
            --notice-highlight: #ffdd44; 
            --box-shadow-premium: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --text-color: #0f172a;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-hover: rgba(239, 68, 68, 0.05);
            --drawer-bg: rgba(255, 255, 255, 0.98);
            --skeleton-bg: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            --notice-bg: rgba(15, 23, 42, 0.05);
            --notice-text-color: #1e293b; 
            --notice-highlight: #dc2626;  
            --box-shadow-premium: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s, color 0.4s;
        }

        header {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--box-shadow-premium);
            flex-shrink: 0;
            width: 100%;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .menu-btn {
            background: #ef4444;
            border: none; color: white; font-size: 16px; width: 40px; height: 40px;
            border-radius: 12px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        .menu-btn:hover { transform: scale(1.05) rotate(5deg); background: #dc2626; }

        header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--brand-color); text-shadow: 0 0 10px var(--brand-glow); }
        
        .channel-count-badge { 
            background: transparent; 
            color: var(--brand-color); 
            font-size: 12px; 
            font-weight: 600; 
            padding: 6px 14px; 
            border: none; 
            border-radius: 99px; 
        }

        .sidebar-drawer {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100vh;
            background: var(--drawer-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.4); z-index: 10000;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .sidebar-drawer.open { left: 0; }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .drawer-header h2 { font-size: 18px; font-weight: 700; background: linear-gradient(45deg, #ff3366, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .close-drawer-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--brand-color); font-size: 14px; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .drawer-menu-items { padding: 24px 16px; display: flex; flex-direction: column; gap: 12px; }
        .drawer-item { display: flex; align-items: center; gap: 16px; padding: 14px 16px; color: var(--text-color); font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.02); transition: all 0.25s ease; }
        .drawer-item:hover { transform: translateX(6px); background: rgba(255, 255, 255, 0.05); }
        .drawer-item .icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; }
        
        .fav-item .icon-box { background: linear-gradient(135deg, #ec4899, #be185d); box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); }
        .recent-item .icon-box { background: linear-gradient(135deg, #8b5cf6, #6d28d9); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }

        .theme-item .icon-box { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .lang-item .icon-box { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .refresh-item .icon-box { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .telegram-item .icon-box { background: linear-gradient(135deg, #0088cc, #006699); box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3); }
        .facebook-item .icon-box { background: linear-gradient(135deg, #1877f2, #0d5bf2); box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3); }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .drawer-overlay.show { opacity: 1; pointer-events: auto; }

        .player-left-column {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex-shrink: 0;
        }

        .player-section {
            background: #000 !important; 
            width: calc(100% - 24px) !important;
            margin: 12px auto 8px auto !important;
            position: relative !important;
            z-index: 95 !important;
            border-radius: 16px !important; 
            overflow: hidden !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 25px var(--brand-glow) !important;
            border: 1px solid rgba(239, 68, 68, 0.25) !important; 
            display: block !important;
            transition: all 0.3s ease;
        }

        .video-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; }
        .video-js, .native-player-style { width: 100% !important; height: 100% !important; }
        
        .video-js.vjs-size-original video, .vjs-size-original { object-fit: contain !important; }
        .video-js.vjs-size-fit video, .vjs-size-fit { object-fit: fill !important; }
        .video-js.vjs-size-stretch video, .vjs-size-stretch, .video-js.forced-zoom video, .forced-zoom { object-fit: cover !important; }

        /* Video.js কাস্টম জুম বাটন আইকন */
        .vjs-zoom-control-btn {
            cursor: pointer;
        }
        .vjs-zoom-control-btn .vjs-icon-placeholder:before {
            content: "\f00e";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 1.3em;
            line-height: 1.8;
        }

        .player-nav-zone {
            position: absolute;
            top: 0;
            bottom: 45px;
            width: 20%;   
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0);
            font-size: 24px;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        .player-nav-left { left: 0; }
        .player-nav-right { right: 0; }
        .player-nav-zone:hover {
            background: rgba(0, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        .player-nav-zone:active {
            background: rgba(239, 68, 68, 0.15);
            color: var(--brand-color);
        }

        .app-notice-bar {
            background: var(--notice-bg);
            border: 1px solid #ff3333; 
            margin: 0 12px 6px 12px;
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            flex-shrink: 0;
            animation: borderRainbow 8s infinite linear;
        }

        @keyframes borderRainbow {
            0% { border-color: rgba(255, 51, 51, 0.4); box-shadow: 0 0 6px rgba(255, 51, 51, 0.1); }      
            25% { border-color: rgba(0, 112, 243, 0.4); box-shadow: 0 0 6px rgba(0, 112, 243, 0.1); }     
            50% { border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 6px rgba(16, 185, 129, 0.1); }    
            75% { border-color: rgba(121, 40, 202, 0.4); box-shadow: 0 0 6px rgba(121, 40, 202, 0.1); }    
            100% { border-color: rgba(255, 51, 51, 0.4); box-shadow: 0 0 6px rgba(255, 51, 51, 0.1); }    
        }

        .notice-badge {
            background: var(--brand-color);
            color: white;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px var(--brand-glow);
        }
        
        .notice-marquee-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        .app-notice-bar marquee { 
            color: var(--notice-text-color) !important; 
            font-weight: 500; 
            width: 100%;
            letter-spacing: 0.2px;
        }
        .app-notice-bar b, .app-notice-bar strong {
            color: var(--notice-highlight) !important;
            font-weight: 700;
        }

        .sticky-controls-container { 
            padding: 4px 12px; 
            background: var(--bg-color);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .controls-wrapper {
            background: var(--panel-bg); 
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color); 
            border-radius: 12px;
            padding: 5px; 
            display: flex; 
            align-items: center; 
            gap: 6px;
            box-shadow: var(--box-shadow-premium);
            width: 100%;
        }

        .category-select-wrapper, .size-select-wrapper { position: relative; flex: 1; }
        .size-select-wrapper { flex: 0.8; }

        .category-dropdown, .size-dropdown {
            width: 100%; padding: 8px 12px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);
            font-size: 12px; font-weight: 500; outline: none; cursor: pointer; appearance: none;
            transition: all 0.3s ease;
        }
        .category-dropdown:focus, .size-dropdown:focus {
            border-color: var(--brand-color);
            box-shadow: 0 0 10px var(--brand-glow);
        }
        .category-select-wrapper::after, .size-select-wrapper::after {
            content: "\f0d7"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: var(--brand-color); pointer-events: none;
        }

        .search-container { flex: 1.1; position: relative; }
        .search-input {
            width: 100%; padding: 8px 12px 8px 32px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color);
            font-size: 12px; outline: none; transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: var(--brand-color);
            box-shadow: 0 0 10px var(--brand-glow);
        }
        .search-container::before {
            content: "\f002"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--brand-color);
        }

        .app-layout { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            overflow: hidden; 
            width: 100%;
        }
        
        .right-column-wrapper { 
            display: flex; 
            flex-direction: column; 
            flex: 1;
            overflow: hidden;
            width: 100%;
        }

        .main-content { 
            flex: 1; 
            padding: 4px 12px 20px 12px; 
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }
        
        .channel-list { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
            margin-top: 4px;
            width: 100%;
            max-width: 100%;
        }

        .channel-row {
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 14px; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            text-align: center;
            gap: 8px;
            cursor: pointer; 
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .channel-row:hover, .channel-row:focus { 
            background: var(--card-hover); 
            border-color: rgba(239, 68, 68, 0.35); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.15);
            outline: 3px solid #ffdd44 !important;
        }
        .channel-row.active-channel { 
            background: rgba(239, 68, 68, 0.12); 
            border-color: var(--brand-color); 
            box-shadow: 0 0 14px var(--brand-glow);
        }

        .channel-left { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 6px; 
            width: 100%; 
            max-width: 100%;
        }
        
        .logo-wrapper {
            width: 54px; height: 54px; flex-shrink: 0; background: rgba(255, 255, 255, 0.03);
            border-radius: 12px; border: 1px solid var(--border-color);
            padding: 5px; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease;
        }
        .channel-row:hover .logo-wrapper { transform: scale(1.04); }
        .channel-logo { width: 100%; height: 100%; object-fit: contain; border-radius: 6px; }
        .channel-fallback-logo { font-size: 20px; color: var(--text-muted); }
        
        .channel-name { 
            font-size: 12px; 
            font-weight: 600; 
            color: var(--text-color); 
            width: 100%;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            padding: 0 2px;
        }
        .channel-row:hover .channel-name { color: var(--brand-color); }
        .channel-row.active-channel .channel-name { color: var(--brand-color); font-weight: 700; }
        
        .channel-right-action { position: absolute; top: 6px; right: 6px; display: flex; align-items: center; gap: 4px; }
        .fav-star-btn {
            background: rgba(0,0,0,0.4);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 2;
        }
        .fav-star-btn.is-fav {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.2);
        }
        .fav-star-btn:hover { transform: scale(1.15); }

        .channel-live-badge { 
            background: var(--brand-color); 
            color: white; 
            font-size: 8px; 
            font-weight: 800; 
            padding: 1px 5px; 
            border-radius: 4px; 
            display: none; 
            letter-spacing: 0.5px; 
            box-shadow: 0 0 6px var(--brand-glow); 
        }
        .active-channel .channel-live-badge { display: inline-block !important; }

        .no-result { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; grid-column: span 2; }
        
        #loadingLayout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; }
        .skeleton-item {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%;
            position: relative; overflow: hidden;
        }
        .skeleton-left { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
        
        .skeleton-logo { 
            width: 54px; height: 54px; 
            background: var(--skeleton-bg); 
            background-size: 200% 100%;
            border-radius: 12px; 
            animation: shimmer-effect 1.5s infinite linear; 
        }
        .skeleton-text { 
            width: 65%; height: 12px; 
            background: var(--skeleton-bg); 
            background-size: 200% 100%;
            border-radius: 4px; 
            animation: shimmer-effect 1.5s infinite linear; 
        }
        .skeleton-right { display: none; }

        @keyframes shimmer-effect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (min-width: 951px) {
            body { height: 100vh; overflow: hidden; }
            .app-layout {
                display: grid; 
                grid-template-columns: 1.55fr 1.05fr; 
                gap: 20px;
                padding: 20px; 
                flex: 1; 
                height: calc(100vh - 70px);
                max-width: 1550px; 
                margin: 0 auto; 
                width: 100%; 
                overflow: hidden;
            }
            
            .player-left-column {
                display: block !important;
                width: 100% !important;
                height: auto !important;
            }

            .player-section { 
                width: 100% !important; 
                margin: 0 !important; 
                border-radius: 20px !important; 
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5) !important; 
                border: 1px solid rgba(239, 68, 68, 0.2) !important; 
            }
            
            .player-left-column .app-notice-bar { 
                display: none !important; 
            }
            
            .right-column-wrapper { 
                display: flex; 
                flex-direction: column; 
                overflow: hidden; 
                height: 100%; 
                background: var(--panel-bg); 
                backdrop-filter: var(--glass-blur); 
                -webkit-backdrop-filter: var(--glass-blur);
                border: 1px solid var(--border-color); 
                border-radius: 20px; 
                box-shadow: var(--box-shadow-premium);
                width: 100%;
            }
            
            .sticky-controls-container { 
                position: static; 
                padding: 16px; 
                border-bottom: 1px solid var(--border-color); 
                background: transparent; 
                display: flex !important;
                flex-direction: column !important;
                gap: 10px !important;
                width: 100%;
            }

            .sticky-controls-container .app-notice-bar {
                display: flex !important;
                margin: 0 !important;
                width: 100% !important;
            }
            
            .controls-wrapper { 
                display: flex !important; 
                background: transparent; 
                border: none; 
                padding: 0; 
                box-shadow: none;
                width: 100%;
            }
            
            .main-content { 
                max-width: 100%; 
                margin: 0; 
                padding: 16px; 
                overflow-y: auto; 
                overflow-x: hidden;
                height: 100%; 
                width: 100%;
            }

            .channel-list, #loadingLayout { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 12px;
            }
            .channel-row {
                padding: 14px 10px;
                border-radius: 16px;
            }
            .logo-wrapper {
                width: 58px; height: 58px;
            }
            .no-result { grid-column: span 3; }
            .channel-name { font-size: 13.5px; }
        }

        @media (max-width: 950px) and (orientation: landscape) {
            header, .sticky-controls-container, .main-content, .app-notice-bar { display: none !important; }
            .player-section { width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; border: none; border-radius: 0 !important; margin: 0 !important; z-index: 9999999; display: block !important; }
            .video-container, .video-js, .native-player-style { width: 100vw !important; height: 100vh !important; }
            .video-js video, .native-player-style { object-fit: fill !important; }
        }
    </style>
</head>
<body>

    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleMenu()"></div>
    <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="drawer-header">
            <h2 id="langPanelTitle">নিয়ন্ত্রণ প্যানেল</h2>
            <button class="close-drawer-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="drawer-menu-items">
            <div class="drawer-item fav-item" onclick="showFavoriteChannels()">
                <div class="icon-box"><i class="fa-solid fa-star"></i></div>
                <span id="langFavText">প্রিয় চ্যানেল</span>
            </div>
            <div class="drawer-item recent-item" onclick="showRecentChannels()">

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        let player = null; 
        let hlsBackupEngine = null;
        let isFirstInit = true; 
        let currentVideoSize = 'fit'; 
        
        const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';
        
        const fetchUrls = [
            'https://corsproxy.io/?' + encodeURIComponent(githubUrl), 
            githubUrl,
            'https://api.allorigins.win/raw?url=' + encodeURIComponent(githubUrl)
        ];

        let currentUrlIndex = 0;
        let allChannels = [];
        let displayedChannels = []; 
        let activeChannelIndex = -1; 
        
        let currentSelectedCategory = 'All'; 
        let lastUserCategory = 'All'; 
        let searchTimeout;
        let currentLang = localStorage.getItem('bdTvLang') || 'bn';

        let currentPlayerEngineMode = 0; 
        
        let favoriteChannels = JSON.parse(localStorage.getItem('bdTvFavorites')) || [];
        let recentChannels = JSON.parse(localStorage.getItem('bdTvRecents')) || [];

        const languages = {
            bn: {
                appTitle: "বাংলা টিভি", panelTitle: "নিয়ন্ত্রণ প্যানেল", toggleText: "Language: English",
                favText: "প্রিয় চ্যানেল", recentText: "সাম্প্রতিক প্লে",
                themeText: "থিম পরিবর্তন (Light/Dark)", refreshText: "প্লেলিস্ট রিফ্রেশ করুন",
                telegramText: "টেলিগ্রাম চ্যানেল (লিংক)", facebookText: "ফেসবুক পেজ (সাপোর্ট)",
                noChannel: "কোনো চ্যানেল সিলেক্ট করা নেই",
                noticeBadge: "নোটিশ", 
                noticeText: "আমাদের সার্ভারে স্বাগতম! বাফারিং সমস্যা এড়াতে আপনার <b>Internet কানেকশন</b> চেক করুন। ব্রাউজারে ফুল-স্ক্রিন ও বাফারিংহীন সেরা অভিজ্ঞতার জন্য অবশ্যই <b>\"ভিয়া ব্রাউজার\" (Via Browser)</b> ব্যবহার করুন। কোনো চ্যানেল না চললে প্লেলিস্ট রিফ্রেশ করুন।",
                searchPlaceholder: "চ্যানেল সার্চ করুন...", noResult: "কোনো চ্যানেল খুঁজে পাওয়া যায়নি!",
                allCat: "সব ক্যাটাগরি",
                favCat: "প্রিয় চ্যানেলসমূহ",
                recentCat: "সাম্প্রতিক প্লে"
            },
            en: {
                appTitle: "Bangla TV", panelTitle: "Control Panel", toggleText: "ভাষা: বাংলা",
                favText: "Favorite Channels", recentText: "Recently Played",
                themeText: "Change Theme (Light/Dark)", refreshText: "Refresh Playlist",
                telegramText: "Telegram Channel (Link)", facebookText: "Facebook Page (Support)",
                noChannel: "No channel selected",
                noticeBadge: "Notice", 
                noticeText: "Welcome to our server! Check your <b>Internet Connection</b> to avoid buffering. For the best full-screen & buffering-free experience in browser, please use <b>\"Via Browser\"</b>. Refresh the playlist if channels fail.",
                searchPlaceholder: "Search channel...", noResult: "No channels found!",
                allCat: "All Categories",
                favCat: "Favorite Channels",
                recentCat: "Recently Played"
            }
        };

        function toggleMenu() {
            document.getElementById('sidebarDrawer').classList.toggle('open');
            document.getElementById('drawerOverlay').classList.toggle('show');
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
            toggleMenu();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            localStorage.setItem('bdTvLang', currentLang);
            applyLanguageTranslations();
            toggleMenu();
        }

        /* অটো-রোটেট এবং ফুলস্ক্রিন অ্যাকশন */
        function triggerAutoRotateFullscreen() {
            const playerContainer = document.getElementById('playerSection') || document.getElementById('live-player');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (playerContainer.requestFullscreen) {
                    playerContainer.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock('landscape').catch(() => {});
                        }
                    }).catch(() => {});
                } else if (playerContainer.webkitRequestFullscreen) {
                    playerContainer.webkitRequestFullscreen();
                } else if (player && player.requestFullscreen) {
                    player.requestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.unlock) {
                            screen.orientation.unlock();
                        }
                    }).catch(() => {});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        function changeVideoSize(size) {
            currentVideoSize = size;
            const sizeDropdown = document.getElementById('videoSizeDropdown');
            if (sizeDropdown) sizeDropdown.value = size;

            const targetPlayer = document.getElementById('live-player');
            if (targetPlayer) {
                targetPlayer.classList.remove('vjs-size-original', 'vjs-size-fit', 'vjs-size-stretch', 'forced-zoom');
                targetPlayer.classList.add('vjs-size-' + size);
            }
        }

        /* Video.js-এর নিজস্ব Zoom বাটনে ক্লিক করলে অটো রোটেট ও ফুলস্ক্রিন টগল হবে */
        function addZoomButtonToVideoJS() {
            if (!player) return;
            const controlBar = player.controlBar;
            if (controlBar && !controlBar.getChild('ZoomButton')) {
                const Button = videojs.getComponent('Button');
                const ZoomButton = videojs.extend(Button, {
                    constructor: function() {
                        Button.apply(this, arguments);
                        this.addClass('vjs-zoom-control-btn');
                        this.controlText('Zoom');
                    },
                    handleClick: function() {
                        // জুম বাটনে ক্লিক করলেই অটো-রোটেট সহ ফুলস্ক্রিন অন/অফ হবে
                        triggerAutoRotateFullscreen();
                    }
                });
                videojs.registerComponent('ZoomButton', ZoomButton);
                
                const fullscreenToggleIndex = controlBar.children_.findIndex(c => c.name_ === 'FullscreenToggle');
                if (fullscreenToggleIndex !== -1) {
                    controlBar.addChild('ZoomButton', {}, fullscreenToggleIndex);
                } else {
                    controlBar.addChild('ZoomButton');
                }
            }
        }

        function applyCurrentSizeClass() {
            const targetPlayer = document.getElementById('live-player');
            if (targetPlayer) {
                targetPlayer.classList.remove('vjs-size-original', 'vjs-size-fit', 'vjs-size-stretch', 'forced-zoom');
                targetPlayer.classList.add('vjs-size-' + currentVideoSize);
            }
        }

        function updateNoticeMarquee(text) {
            const holders = document.querySelectorAll('.marqueeHolderClass');
            holders.forEach(holder => {
                holder.innerHTML = `<marquee behavior="scroll" direction="left" scrollamount="4" loop="infinite">${text}</marquee>`;
            });
        }

        function applyLanguageTranslations() {
            const lang = languages[currentLang];
            document.getElementById('langAppTitle').innerText = lang.appTitle;
            document.getElementById('langPanelTitle').innerText = lang.panelTitle;
            document.getElementById('langFavText').innerText = lang.favText;
            document.getElementById('langRecentText').innerText = lang.recentText;
            document.getElementById('langToggleText').innerText = lang.toggleText;
            document.getElementById('langThemeText').innerText = lang.themeText;
            document.getElementById('langRefreshText').innerText = lang.refreshText;
            document.getElementById('langTelegramText').innerText = lang.telegramText;
            document.getElementById('langFacebookText').innerText = lang.facebookText;
            
            document.querySelectorAll('.langNoticeBadgeClass').forEach(badge => {
                badge.innerText = lang.noticeBadge;
            });
            
            updateNoticeMarquee(lang.noticeText);
            document.getElementById('searchBox').placeholder = lang.searchPlaceholder;

            const firstOption = document.querySelector('#categoryDropdown option[value="All"]');
            if(firstOption) firstOption.innerText = lang.allCat;
        }

        function refreshPlaylist() {
            toggleMenu();
            document.getElementById('loadingLayout').style.display = 'grid';
            document.getElementById('channelList').innerHTML = '';
            currentUrlIndex = 0;
            fetchPlaylist();
        }

        async function fetchPlaylist() {
            if (currentUrlIndex >= fetchUrls.length) {
                document.getElementById('loadingLayout').style.display = 'none';
                document.getElementById('channelList').innerHTML = `<div class='no-result'>${languages[currentLang].noResult}</div>`;
                return;
            }
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);

                const response = await fetch(fetchUrls[currentUrlIndex], { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error();
                const textData = await response.text();
                
                if(textData && textData.includes('#EXTM3U')) {
                    parseM3U(textData);
                } else {
                    throw new Error();
                }
            } catch (err) {
                currentUrlIndex++;
                await fetchPlaylist();
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            allChannels = [];
            let categories = new Set();
            let currentName = ''; let currentLogo = ''; let currentGroup = 'Uncategorized';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1] : 'Uncategorized';
                    const nameParts = line.split(',');
                    currentName = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, logo: currentLogo, category: currentGroup, url: line });
                        if(currentGroup !== 'Uncategorized') categories.add(currentGroup);
                    }
                    currentName = ''; currentLogo = '';
                }
            });

            document.getElementById('totalChannels').innerText = "CH-" + allChannels.length;
            populateCategoryDropdown(categories);
            
            displayedChannels = [...allChannels]; 
            renderChannels(displayedChannels); 
            document.getElementById('loadingLayout').style.display = 'none';
            
            initVideoPlayerEngine();

            if (displayedChannels.length > 0 && window.innerWidth > 950) {
                playChannelAt(0);
            }
        }

        function initVideoPlayerEngine() {
            try {
                if (!player) {
                    player = videojs('live-player');
                    applyCurrentSizeClass();
                    addZoomButtonToVideoJS();
                    setupForcedDoubleTapZoom();

                    player.on('error', function() {
                        if (isFirstInit) {
                            isFirstInit = false;
                            return; 
                        }
                        handlePlayerFallbackLoop();
                    });
                }
            } catch(e) {}
        }

        function handlePlayerFallbackLoop() {
            if (activeChannelIndex === -1 || displayedChannels.length === 0) return;
            
            currentPlayerEngineMode = (currentPlayerEngineMode + 1) % 3; 
            
            if (currentPlayerEngineMode === 0) {
                switchToVideoJsPlayer();
            } else if (currentPlayerEngineMode === 1) {
                switchToHlsBackup();
            } else if (currentPlayerEngineMode === 2) {
                switchToNativePlayer();
            }
        }

        function switchToVideoJsPlayer() {
            if (hlsBackupEngine) { hlsBackupEngine.destroy(); hlsBackupEngine = null; }
            const channelObj = displayedChannels[activeChannelIndex];
            
            if (!player) {
                initVideoPlayerEngine();
            }
            
            applyCurrentSizeClass();

            try {
                player.src({ src: channelObj.url, type: 'application/x-mpegURL' });
                player.play().catch(e => {});
            } catch(e) {}
        }

        function switchToHlsBackup() {
            const channelObj = displayedChannels[activeChannelIndex];
            const videoElement = document.getElementById('live-player');
            
            if (player) {
                player.pause();
            }
            if (hlsBackupEngine) { hlsBackupEngine.destroy(); hlsBackupEngine = null; }

            applyCurrentSizeClass();

            if (Hls.isSupported()) {
                hlsBackupEngine = new Hls({ maxLoadingDelay: 4 });
                hlsBackupEngine.loadSource(channelObj.url);
                hlsBackupEngine.attachMedia(videoElement);

                videoElement.onerror = function() {
                    handlePlayerFallbackLoop();
                };

                hlsBackupEngine.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        handlePlayerFallbackLoop();
                    }
                });
                videoElement.play().catch(e => {});
            } else {
                handlePlayerFallbackLoop();
            }
        }

        function switchToNativePlayer() {
            if (hlsBackupEngine) { hlsBackupEngine.destroy(); hlsBackupEngine = null; }

            const channelObj = displayedChannels[activeChannelIndex];
            const videoElement = document.getElementById('live-player');
            
            if (player) {
                player.pause();
            }

            applyCurrentSizeClass();
            
            videoElement.src = channelObj.url;

            videoElement.onerror = function() {
                handlePlayerFallbackLoop();
            };
            
            videoElement.play().catch(e => {});
        }

        function populateCategoryDropdown(categories) {
            const dropdown = document.getElementById('categoryDropdown');
            dropdown.innerHTML = `<option value="All">${languages[currentLang].allCat}</option>`;
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat;
                dropdown.appendChild(option);
            });
        }

        function toggleFavorite(event, url) {
            event.stopPropagation();
            const index = favoriteChannels.indexOf(url);
            if (index > -1) {
                favoriteChannels.splice(index, 1);
            } else {
                favoriteChannels.push(url);
            }
            localStorage.setItem('bdTvFavorites', JSON.stringify(favoriteChannels));
            renderChannels(displayedChannels);
        }

        function addToRecents(channelObj) {
            recentChannels = recentChannels.filter(ch => ch.url !== channelObj.url);
            recentChannels.unshift(channelObj);
            if(recentChannels.length > 20) recentChannels.pop(); 
            localStorage.setItem('bdTvRecents', JSON.stringify(recentChannels));
        }

        function showFavoriteChannels() {
            toggleMenu();
            document.getElementById('searchBox').value = '';
            displayedChannels = allChannels.filter(ch => favoriteChannels.includes(ch.url));
            activeChannelIndex = -1;
            renderChannels(displayedChannels);
        }

        function showRecentChannels() {
            toggleMenu();
            document.getElementById('searchBox').value = '';
            displayedChannels = [...recentChannels];
            activeChannelIndex = -1;
            renderChannels(displayedChannels);
        }

        function renderChannels(channels) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';

            if(channels.length === 0) {
                listContainer.innerHTML = `<div class="no-result">${languages[currentLang].noResult}</div>`;
                return;
            }

            channels.forEach((ch, index) => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.setAttribute('data-index', index);
                row.setAttribute('tabindex', '0'); 
                
                if (index === activeChannelIndex) row.classList.add('active-channel');
                
                row.onclick = function() { playChannelAt(index); };
                
                row.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        playChannelAt(index);
                    }
                });

                let logoHtml = ch.logo ? `<img class="channel-logo" src="${ch.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : '';
                const fallbackHtml = `<div class="channel-fallback-logo" style="display: ${ch.logo ? 'none' : 'flex'}"><i class="fa-solid fa-tv"></i></div>`;
                
                const isFav = favoriteChannels.includes(ch.url);

                row.innerHTML = `
                    <div class="channel-left">
                        <div class="logo-wrapper">${logoHtml}${fallbackHtml}</div>
                        <div class="channel-name">${ch.name}</div>
                    </div>
                    <div class="channel-right-action">
                        <button class="fav-star-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite(event, '${ch.url}')">
                            <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                        </button>
                        <span class="channel-live-badge">LIVE</span>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        function playChannelAt(index) {
            if (displayedChannels.length === 0 || index < 0 || index >= displayedChannels.length) return;
            
            activeChannelIndex = index;
            const ch = displayedChannels[index];

            addToRecents(ch);

            document.querySelectorAll('.channel-row').forEach(row => row.classList.remove('active-channel'));
            const activeRow = document.querySelector(`.channel-row[data-index="${index}"]`);
            if (activeRow) {
                activeRow.classList.add('active-channel');
                activeRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            isFirstInit = false; 
            currentPlayerEngineMode = 0;

            if (!player) {
                initVideoPlayerEngine();
            }

            applyCurrentSizeClass();

            try {
                player.src({ src: ch.url, type: 'application/x-mpegURL' });
                player.play().catch(e => {});
            } catch(e) {}
        }

        function navigateChannel(direction) {
            if (displayedChannels.length === 0) return;
            
            let nextIndex = activeChannelIndex;
            if (direction === 'next') {
                nextIndex = activeChannelIndex + 1;
                if (nextIndex >= displayedChannels.length) nextIndex = 0; 
            } else if (direction === 'prev') {
                nextIndex = activeChannelIndex - 1;
                if (nextIndex < 0) nextIndex = displayedChannels.length - 1; 
            }
            
            playChannelAt(nextIndex);
        }

        function filterCategory(category) {
            currentSelectedCategory = category; 
            if (document.getElementById('searchBox').value === '') lastUserCategory = category;
            document.getElementById('categoryDropdown').value = category;

            if (category === 'All') {
                displayedChannels = [...allChannels];
            } else {
                displayedChannels = allChannels.filter(ch => ch.category === category);
            }
            
            activeChannelIndex = -1; 
            renderChannels(displayedChannels);
        }

        function searchChannel() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('searchBox').value.toLowerCase().trim();
                if (query !== '') {
                    document.getElementById('categoryDropdown').value = 'All'; 
                    displayedChannels = allChannels.filter(ch => ch.name.toLowerCase().includes(query));
                } else {
                    if (lastUserCategory === 'All') {
                        displayedChannels = [...allChannels];
                    } else {
                        displayedChannels = allChannels.filter(ch => ch.category === lastUserCategory);
                    }
                    document.getElementById('categoryDropdown').value = lastUserCategory;
                }
                activeChannelIndex = -1;
                renderChannels(displayedChannels);
            }, 300);
        }

        function setupForcedDoubleTapZoom() {
            const container = document.getElementById('videoContainer');
            let lastTapTime = 0;
            container.addEventListener('touchstart', function(e) {
                if (e.target.classList.contains('player-nav-zone') || e.target.closest('.player-nav-zone')) return;
                
                const now = new Date().getTime();
                if (now - lastTapTime < 300) {
                    e.preventDefault(); 
                    const targetPlayer = document.getElementById('live-player');
                    if(targetPlayer) targetPlayer.classList.toggle('forced-zoom');
                }
                lastTapTime = now;
            });
        }

        window.onload = function() {
            applyLanguageTranslations();
            fetchPlaylist();
        };
    </script>
</body>
</html>
