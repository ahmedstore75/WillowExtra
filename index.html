<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>এস এ লাইভ টিভি</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <!-- 🌍 ওয়ার্ল্ড ক্লাস আইকনের জন্য Font Awesome CDNs যুক্ত করা হলো -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* থিম ভেরিয়েবল */
        :root {
            --bg-color: #060913;
            --panel-bg: #0b0f19;
            --text-color: #e2e8f0;
            --input-bg: #1e293b;
            --border-color: #334155;
            --card-bg: linear-gradient(135deg, #111827, #1e293b);
            --card-hover: linear-gradient(135deg, #1e293b, #ff333322);
            --drawer-bg: rgba(11, 15, 25, 0.92); 
            --menu-text-color: #ff4d4d;
            --notice-bg: linear-gradient(90deg, #0f172a, #1e1b4b);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-color: #1e293b;
            --input-bg: #cbd5e1;
            --border-color: #cbd5e1;
            --card-bg: linear-gradient(135deg, #ffffff, #f8fafc);
            --card-hover: linear-gradient(135deg, #f1f5f9, #ff333311);
            --drawer-bg: rgba(255, 255, 255, 0.92);
            --menu-text-color: #cc0000;
            --notice-bg: linear-gradient(90deg, #f8fafc, #fee2e2);
        }

        body {
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* হেডার */
        header {
            background: linear-gradient(90deg, #121214, #1a1a1e);
            padding: 14px 15px;
            border-bottom: 2px solid #ff3333; 
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.3);
            z-index: 999;
            position: relative; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px; 
            flex: 1;
            overflow: hidden;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ff3333 !important;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        header h1 {
            color: #ff3333; 
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-count-badge {
            background: none; 
            color: #ff3333; 
            font-size: 13px;
            font-weight: bold;
            padding: 4px 12px; 
            border: 2px solid #ff3333; 
            border-radius: 20px; 
            letter-spacing: 0.5px;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.4); 
            flex-shrink: 0; 
        }

        /* 👑 প্রিমিয়াম সাইডবার ড্রয়ার */
        .sidebar-drawer {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: var(--drawer-bg);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 15px 0 40px rgba(0, 0, 0, 0.7);
            z-index: 10000;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 51, 51, 0.25);
        }

        .sidebar-drawer.open { left: 0; }

        .drawer-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, rgba(18, 18, 20, 0.95), rgba(26, 26, 30, 0.95));
            border-bottom: 2px solid #ff3333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-header h2 {
            color: #ff3333;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
        }

        .close-drawer-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 14px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .close-drawer-btn:hover {
            background: #ff3333;
            color: #fff;
        }

        .drawer-menu-items {
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            overflow-y: auto;
        }

        /* 🎯 ওয়ার্ল্ড ক্লাস মেনু আইটেম ডিজাইন */
        .drawer-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            color: var(--text-color); 
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drawer-item:hover {
            background: linear-gradient(90deg, rgba(255, 51, 51, 0.15), transparent);
            border-color: rgba(255, 51, 51, 0.5);
            transform: translateX(5px);
            color: #ff4d4d;
        }

        /* ⚡ প্রিমিয়াম আইকন বক্স গ্লো স্টাইল */
        .drawer-item .icon-box {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff3333;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .drawer-item:hover .icon-box {
            background: linear-gradient(135deg, #ff3333, #bd0000);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 0 12px rgba(255, 51, 51, 0.6);
            transform: scale(1.05);
        }

        .drawer-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(3, 5, 10, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.show { opacity: 1; pointer-events: auto; }

        /* কন্ট্রোল এরিয়া */
        .controls-wrapper {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 15px;
            display: none; 
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .category-select-wrapper {
            position: relative;
            flex: 1; 
        }

        .category-dropdown {
            width: 100%;
            padding: 10px 30px 10px 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
        }

        .category-select-wrapper::after {
            content: "▼";
            font-size: 10px;
            color: #ff3333;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .search-container { 
            min-width: 140px;
            max-width: 170px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 15px 15px; 
            position: relative;
        }

        /* প্রিমিয়াম ডায়নামিক প্লেয়ার সেকশন */
        .player-section {
            background: radial-gradient(circle at center, #1e1212 0%, #000000 100%);
            width: 100%;
            position: relative;
            padding: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 51, 51, 0.15); 
            border-bottom: 1px solid rgba(255, 51, 51, 0.3);
            display: none; 
            transition: all 0.4s ease;
        }

        .playing-now-bar {
            background: var(--notice-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 15px;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 700;
            border-radius: 12px 12px 0 0;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, transparent, #ff3333, transparent) 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        .notice-live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #ff3333;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            background: #000;
            overflow: hidden;
            border-radius: 0 0 12px 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .video-js {
            background-color: #000 !important;
            width: 100% !important;
            height: 100% !important;
        }

        .video-js video,
        .video-js .vjs-tech {
            object-fit: contain !important; 
            transition: transform 0.2s ease, object-fit 0.2s ease;
        }

        .video-js.forced-zoom video,
        .video-js.forced-zoom .vjs-tech {
            object-fit: cover !important; 
            transform: scale(1.02);
        }

        .vjs-custom-rotate-button {
            cursor: pointer;
            font-size: 1.6em;
            line-height: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
        }

        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px; 
        }

        .channel-row {
            background: var(--card-bg); 
            border-radius: 8px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid var(--border-color);
            border-left: 5px solid #ff3333; 
        }

        .channel-row.active-channel {
            background: linear-gradient(135deg, #1e293b, #ff333333);
            border-left-color: #ff3333;
        }

        .channel-left {
            display: flex;
            align-items: center;
            gap: 15px;
            overflow: hidden;
            width: 75%; 
        }

        .logo-wrapper {
            width: 45px;
            height: 45px;
            flex-shrink: 0;
        }

        .channel-logo {
            width: 100%;
            height: 100%;
            background-color: #060913;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff3333;
            font-size: 18px;
            object-fit: contain;
            border: 1px solid #ff333344;
        }

        .channel-name {
            font-size: 15px;
            color: var(--text-color);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-right-action {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 60px;
        }

        .play-icon { 
            color: #ff3333; 
            font-size: 18px; 
            display: inline-block;
        }

        .channel-live-badge {
            background-color: #ff3333;
            color: #ffffff;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 900;
            display: none; 
            letter-spacing: 0.5px;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
            animation: pulse-live 1.5s infinite alternate;
        }

        @keyframes pulse-live {
            from { transform: scale(1); opacity: 0.9; }
            to { transform: scale(1.05); opacity: 1; }
        }

        .active-channel .play-icon {
            display: none !important;
        }

        .active-channel .channel-live-badge {
            display: inline-block !important;
        }

        .no-result { text-align: center; color: #ff3333; padding: 20px; font-weight: bold; }
        #loading { text-align: center; font-size: 16px; color: #ff3333; margin-top: 40px; font-weight: bold; }

        @media (min-width: 951px) {
            .app-layout { flex-direction: row; height: calc(100vh - 56px); }
            .player-section {
                flex: 1.5; display: none; border-bottom: none;
                border-right: 3px solid #ff3333; height: 100%;
                display: flex; flex-direction: column;
                padding: 20px; 
            }
            .video-container { width: 100%; flex: 1; aspect-ratio: auto; }
            .main-content { flex: 1; height: 100%; overflow-y: auto; padding: 0 15px 20px 15px; display: flex; flex-direction: column; }
            .channel-list { flex: 1; overflow-y: auto; }
        }

        @media (max-width: 950px) and (orientation: landscape) {
            header, .controls-wrapper, .playing-now-bar, .main-content {
                display: none !important;
            }

            body, html {
                height: 100% !important;
                width: 100% !important;
                overflow: hidden !important;
            }

            .player-section, .video-container {
                width: 100vw !important;
                height: 100vh !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                border: none !important;
                z-index: 9999999 !important;
                display: block !important;
                aspect-ratio: auto !important;
                padding: 0 !important; 
                border-radius: 0 !important;
            }

            .video-js {
                width: 100vw !important;
                height: 100vh !important;
            }

            .video-js video,
            .video-js .vjs-tech {
                object-fit: fill !important; 
            }
        }
    </style>
</head>
<body>

    <!-- সাইডবার ড্রয়ার -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="toggleMenu()"></div>
    <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="drawer-header">
            <h2>নিয়ন্ত্রণ প্যানেল</h2>
            <button class="close-drawer-btn" onclick="toggleMenu()">✕</button>
        </div>
        <div class="drawer-menu-items">
            <!-- 🌓 থিম চেঞ্জার (অরিজিনাল ভেক্টর আইকন) -->
            <div class="drawer-item" onclick="toggleTheme()">
                <div class="icon-box"><i class="fa-solid fa-moon"></i></div>
                <span>থিম পরিবর্তন (Light/Dark)</span>
            </div>
            
            <!-- 🔄 প্লেলিস্ট রিফ্রেশ (অরিজিনাল ভেক্টর আইকন) -->
            <div class="drawer-item" onclick="refreshPlaylist()">
                <div class="icon-box"><i class="fa-solid fa-rotate"></i></div>
                <span>প্লেলিস্ট রিফ্রেশ করুন</span>
            </div>
            
            <!-- ⚠️ রিপোর্ট (অরিজিনাল ভেক্টর আইকন) -->
            <div class="drawer-item" onclick="alert('রিপোর্ট করার জন্য ধন্যবাদ! আমরা লিংকটি পরীক্ষা করব।')">
                <div class="icon-box"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <span>চ্যানেল অচল? রিপোর্ট করুন</span>
            </div>
            
            <!-- 💬 ফেসবুক সাপোর্ট (অরিজিনাল অফিশিয়াল ব্র্যান্ডেড আইকন) -->
            <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank" class="drawer-item">
                <div class="icon-box"><i class="fa-brands fa-facebook-messenger"></i></div>
                <span>ফেসবুক পেজ (সাপোর্ট)</span>
            </a>
        </div>
    </div>

    <!-- হেডার এরিয়া -->
    <header>
        <div class="header-left">
            <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">☰</button>
            <h1>এস এ লাইভ টিভি</h1>
        </div>
        <div class="channel-count-badge" id="totalChannels">CH-0</div>
    </header>

    <div class="app-layout">
        <!-- প্লেয়ার সেকশন -->
        <div class="player-section" id="playerSection">
            <div class="playing-now-bar">
                <span class="notice-live-dot"></span>
                <span>এখন দেখছেন: <span id="playingTitle" style="color: #ff4d4d; text-shadow: 0 0 8px rgba(255,51,51,0.4);">কোনো চ্যানেল সিলেক্ট করা নেই</span></span>
            </div>
            <div class="video-container" id="videoContainer">
                <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline>
                    <p class="vjs-no-js">আপনার ব্রাউজারটি এই প্লেয়ারটি সাপোর্ট করছে না।</p>
                </video>
            </div>
        </div>

        <!-- মেইন কনটেন্ট -->
        <div class="main-content">
            <div class="controls-wrapper" id="controlsWrapper" style="padding-top: 15px; padding-bottom: 15px;">
                <div class="category-select-wrapper">
                    <select class="category-dropdown" id="categoryDropdown" onchange="filterCategory(this.value)">
                        <option value="All">All Categories</option>
                    </select>
                </div>
                <div class="search-container">
                    <input type="text" class="search-input" id="searchBox" placeholder="চ্যানেল সার্চিং..." oninput="searchChannel()">
                </div>
            </div>

            <div id="loading">সার্ভার থেকে চ্যানেল লিস্ট রিড করা হচ্ছে... একটু অপেক্ষা করুন।</div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    
    <script>
        let player; 
        const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u';

        const fetchUrls = [
            githubUrl,
            'https://corsproxy.io/?' + encodeURIComponent(githubUrl),
            'https://api.allorigins.win/raw?url=' + encodeURIComponent(githubUrl),
            'https://thingproxy.freeboard.io/fetch/' + githubUrl
        ];

        let currentUrlIndex = 0;
        let allChannels = [];
        let currentSelectedCategory = 'All'; 
        let lastUserCategory = 'All'; 

        function toggleMenu() {
            const drawer = document.getElementById('sidebarDrawer');
            const overlay = document.getElementById('drawerOverlay');
            drawer.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
            toggleMenu();
        }

        function refreshPlaylist() {
            toggleMenu();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').innerText = "প্লেলিস্ট রিফ্রেশ করা হচ্ছে...";
            document.getElementById('channelList').innerHTML = '';
            currentUrlIndex = 0;
            fetchPlaylist();
        }

        async function fetchPlaylist() {
            if (currentUrlIndex >= fetchUrls.length) {
                document.getElementById('loading').innerHTML = "সব কটি কানেকশন ব্যর্থ হয়েছে।";
                return;
            }
            try {
                const response = await fetch(fetchUrls[currentUrlIndex]);
                if (!response.ok) throw new Error('Load failed');
                const textData = await response.text();
                if(textData && textData.includes('#EXTM3U')) {
                    parseM3U(textData);
                } else {
                    throw new Error('Data format error');
                }
            } catch (err) {
                currentUrlIndex++;
                fetchPlaylist();
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            allChannels = [];
            let categories = new Set();
            let currentName = ''; let currentLogo = ''; let currentGroup = 'Uncategorized';

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1] : 'Uncategorized';
                    const nameParts = line.split(',');
                    currentName = nameParts[nameParts.length - 1].trim();
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({ name: currentName, logo: currentLogo, category: currentGroup, url: line });
                        if(currentGroup !== 'Uncategorized') categories.add(currentGroup);
                    }
                    currentName = ''; currentLogo = '';
                }
            });

            document.getElementById('totalChannels').innerText = "CH-" + allChannels.length;
            populateCategoryDropdown(categories);
            renderChannels(allChannels); 
            document.getElementById('loading').style.display = 'none';
            document.getElementById('controlsWrapper').style.display = 'flex'; 
            
            if (allChannels.length > 0 && window.innerWidth > 950) {
                const firstRow = document.querySelector('.channel-row');
                if(firstRow) firstRow.click();
            }
        }

        function populateCategoryDropdown(categories) {
            const dropdown = document.getElementById('categoryDropdown');
            dropdown.innerHTML = '<option value="All">All Categories</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.innerText = cat;
                dropdown.appendChild(option);
            });
        }

        function renderChannels(channels) {
            const listContainer = document.getElementById('channelList');
            listContainer.innerHTML = '';

            if(channels.length === 0) {
                listContainer.innerHTML = '<div class="no-result">কোনো চ্যানেল খুঁজে পাওয়া যায়নি!</div>';
                return;
            }

            channels.forEach(ch => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.onclick = function() { playVideo(ch.name, ch.url, this); };

                let logoHtml = ch.logo ? `<img class="channel-logo" src="${ch.logo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : '';
                const fallbackLetter = ch.name.charAt(0).toUpperCase();
                const letterHtml = `<div class="channel-logo" style="display: ${ch.logo ? 'none' : 'flex'}">${fallbackLetter}</div>`;

                row.innerHTML = `
                    <div class="channel-left">
                        <div class="logo-wrapper">${logoHtml}${letterHtml}</div>
                        <div class="channel-name">${ch.name}</div>
                    </div>
                    <div class="channel-right-action">
                        <div class="play-icon">▶</div>
                        <span class="channel-live-badge">LIVE</span>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        function filterCategory(category) {
            currentSelectedCategory = category; 
            if (document.getElementById('searchBox').value === '') lastUserCategory = category;
            document.getElementById('categoryDropdown').value = category;

            if (category === 'All') {
                renderChannels(allChannels);
            } else {
                renderChannels(allChannels.filter(ch => ch.category === category));
            }
        }

        function searchChannel() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();
            if (query !== '') {
                currentSelectedCategory = 'All';
                document.getElementById('categoryDropdown').value = 'All'; 
                renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(query)));
            } else {
                filterCategory(lastUserCategory); 
            }
        }

        function playVideo(name, url, clickedElement) {
            document.querySelectorAll('.channel-row.active-channel').forEach(row => row.classList.remove('active-channel'));
            clickedElement.classList.add('active-channel');
            document.getElementById('playingTitle').innerText = name;
            
            const pSection = document.getElementById('playerSection');
            pSection.style.display = (window.innerWidth > 950) ? 'flex' : 'block';
            
            if (!player) {
                player = videojs('live-player');
                addCustomRotateButton(); 
                setupOrientationTrigger();
                setupForcedDoubleTapZoom(); 
            }
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            
            if(window.innerWidth <= 950) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setupForcedDoubleTapZoom() {
            const container = document.getElementById('videoContainer');
            let lastTapTime = 0;

            container.addEventListener('touchstart', function(e) {
                const now = new Date().getTime();
                const timespan = now - lastTapTime;
                
                if (timespan < 300 && timespan > 0) {
                    e.preventDefault(); 
                    toggleZoomState();
                }
                lastTapTime = now;
            }, { passive: false });

            container.addEventListener('dblclick', function(e) {
                e.preventDefault();
                toggleZoomState();
            });

            function toggleZoomState() {
                const playerEl = document.getElementById('live-player');
                if (playerEl) {
                    playerEl.classList.toggle('forced-zoom');
                }
            }
        }

        function addCustomRotateButton() {
            const Button = videojs.getComponent('Button');
            const RotateButton = videojs.extend(Button, {
                constructor: function() {
                    Button.apply(this, arguments);
                    this.controlText('Rotate Screen');
                },
                createEl: function() {
                    return videojs.dom.createEl('button', {
                        className: 'vjs-custom-rotate-button vjs-control vjs-button',
                        innerHTML: '🔄',
                        title: 'Rotate Screen'
                    });
                },
                handleClick: function() {
                    if(window.innerWidth > 950) return;
                    
                    const container = document.getElementById('playerSection');
                    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                        if (container.requestFullscreen) container.requestFullscreen();
                        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                    } else {
                        if (document.exitFullscreen) document.exitFullscreen();
                        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    }
                }
            });
            
            videojs.registerComponent('RotateButton', RotateButton);
            player.getChild('controlBar').addChild('RotateButton', {}, player.getChild('controlBar').children_.length - 1);
        }

        function setupOrientationTrigger() {
            window.addEventListener("resize", checkOrientation);
            window.addEventListener("orientationchange", checkOrientation);

            function checkOrientation() {
                if(window.innerWidth > 950) return;

                if (window.innerWidth > window.innerHeight) {
                    document.body.style.setProperty('--orientation-status', 'landscape');
                    document.querySelector('.app-layout').parentElement.classList.add('landscape-mode');
                } else {
                    document.body.style.setProperty('--orientation-status', 'portrait');
                    document.querySelector('.app-layout').parentElement.classList.remove('landscape-mode');
                }
            }
            
            checkOrientation();
        }

        window.onload = fetchPlaylist;
    </script>
</body>
</html>
