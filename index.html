<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>বাংলা টিভি</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Hind Siliguri', sans-serif; }
        :root { --brand-color: #ef4444; --bg-color: #030712; --panel-bg: rgba(17, 24, 39, 0.85); --text-color: #f3f4f6; --border-color: rgba(255, 255, 255, 0.08); --card-bg: rgba(31, 41, 55, 0.4); }
        
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; overflow-x: hidden; }
        
        header { background: var(--panel-bg); padding: 14px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        
        /* ল্যাপটপ লেআউট */
        .app-layout { display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        
        @media (min-width: 951px) {
            .app-layout { flex-direction: row; align-items: flex-start; max-width: 1400px; margin: 0 auto; }
            .player-section { flex: 2; position: sticky; top: 20px; }
            .sidebar-wrapper { flex: 1; height: 85vh; display: flex; flex-direction: column; }
            .main-content { overflow-y: auto; flex: 1; }
        }

        .player-section { background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); display: none; }
        .video-container { aspect-ratio: 16 / 9; }
        .video-js { width: 100% !important; height: 100% !important; }
        
        .channel-row { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; display: flex; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .channel-row:hover { background: rgba(239, 68, 68, 0.1); }
        .channel-name { margin-left: 15px; font-weight: 600; }
        
        .controls-wrapper { display: flex; gap: 10px; margin-bottom: 15px; }
        .category-dropdown, .search-input { background: #1f2937; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 8px; width: 100%; }
        
        .menu-btn { background: #ef4444; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="menu-btn" onclick="alert('মেনু ফিচার')"><i class="fa-solid fa-bars"></i></button>
            <h1>বাংলা টিভি</h1>
        </div>
    </header>

    <div class="app-layout">
        <!-- বাম পাশ: প্লেয়ার -->
        <div class="player-section" id="playerSection">
            <div style="padding: 10px; font-size: 14px;">এখন দেখছেন: <span id="playingTitle" style="color:var(--brand-color)">-</span></div>
            <div class="video-container" id="videoContainer">
                <video id="live-player" class="video-js vjs-default-skin" controls playsinline></video>
            </div>
        </div>

        <!-- ডান পাশ: চ্যানেল লিস্ট -->
        <div class="sidebar-wrapper">
            <div class="controls-wrapper">
                <select class="category-dropdown" id="categoryDropdown" onchange="filterCategory(this.value)">
                    <option value="All">All Categories</option>
                </select>
                <input type="text" class="search-input" id="searchBox" placeholder="সার্চ করুন..." oninput="searchChannel()">
            </div>
            <div class="main-content">
                <div id="loading">চ্যানেল লোড হচ্ছে...</div>
                <div class="channel-list" id="channelList"></div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script>
        let player;
        const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u';
        let allChannels = [];

        async function fetchPlaylist() {
            try {
                const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(githubUrl));
                const text = await response.text();
                parseM3U(text);
            } catch (e) { document.getElementById('loading').innerText = "লোড ব্যর্থ হয়েছে"; }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let categories = new Set();
            lines.forEach((line, i) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1].trim();
                    const group = line.match(/group-title="([^"]+)"/)?.[1] || 'General';
                    const url = lines[i + 1].trim();
                    allChannels.push({ name, group, url });
                    categories.add(group);
                }
            });
            renderChannels(allChannels);
            const dropdown = document.getElementById('categoryDropdown');
            categories.forEach(cat => dropdown.innerHTML += `<option value="${cat}">${cat}</option>`);
            document.getElementById('loading').style.display = 'none';
        }

        function renderChannels(channels) {
            const list = document.getElementById('channelList');
            list.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-row';
                div.innerHTML = `<div class="channel-name">${ch.name}</div>`;
                div.onclick = () => playVideo(ch);
                list.appendChild(div);
            });
        }

        function playVideo(ch) {
            document.getElementById('playerSection').style.display = 'block';
            document.getElementById('playingTitle').innerText = ch.name;
            if(player) player.dispose();
            player = videojs('live-player');
            player.src({ src: ch.url, type: 'application/x-mpegURL' });
            player.play();
        }

        function filterCategory(cat) {
            renderChannels(cat === 'All' ? allChannels : allChannels.filter(c => c.group === cat));
        }

        function searchChannel() {
            const q = document.getElementById('searchBox').value.toLowerCase();
            renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(q)));
        }

        window.onload = fetchPlaylist;
    </script>
</body>
</html>
